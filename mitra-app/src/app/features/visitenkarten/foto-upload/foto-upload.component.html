<div class="foto-upload">
  <input
    id="foto-input"
    type="file"
    accept="image/*"
    capture="environment"
    style="display: none"
    (change)="onFileSelected($event)"
  />

  @if (!previewUrl()) {
    <button type="button" class="upload-area" (click)="openCamera()">
      <span class="upload-icon">📷</span>
      <span class="upload-text">Visitenkarte fotografieren</span>
      <span class="upload-hint">oder aus Galerie wählen</span>
    </button>
  } @else {
    <div class="preview-container">
      <img [src]="previewUrl()" alt="Visitenkarte" class="preview-img" />
      @if (isProcessing()) {
        <div class="processing-overlay">
          <div class="spinner"></div>
          <span>KI liest Visitenkarte aus…</span>
        </div>
      }
      <button type="button" class="btn-neu" (click)="openCamera()">Neues Foto</button>
    </div>
  }

  @if (errorMsg()) {
    <div class="error-msg">{{ errorMsg() }}</div>
  }
</div>
