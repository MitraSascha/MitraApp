version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mitra
      POSTGRES_USER: mitra
      POSTGRES_PASSWORD: mitra2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=mitra.settings
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost}
      - DB_HOST=postgres
    volumes:
      - ~/.claude:/root/.claude:ro   # Claude CLI Auth-Token vom Host
      - media_data:/app/media
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - django
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./mitra-app/dist/mitra-app/browser:/usr/share/nginx/html:ro
      - media_data:/media:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  media_data:
