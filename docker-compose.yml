services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mitra
      POSTGRES_USER: mitra
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mitra2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mitra"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=mitra.settings
      - DEBUG=False
      - ALLOWED_HOSTS=mitra.eigene-tools.pro
      - DB_HOST=postgres
    volumes:
      - ~/.claude:/root/.claude:ro
      - media_data:/app/media
    expose:
      - "8101"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - django
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./mitra-app/dist/mitra-app/browser:/srv/www:ro
      - media_data:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  media_data:
  caddy_data:
  caddy_config:
