version: '3.9'

# Vollständiger Dev-Stack: PostgreSQL + Artikelstamm + Django + Angular
# Starten:  docker compose -f docker-compose.dev.yml up
# Stoppen:  docker compose -f docker-compose.dev.yml down
#
# App:     http://localhost:4200
# API:     http://localhost:8000

services:
  # Haupt-Datenbank
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mitra
      POSTGRES_USER: mitra
      POSTGRES_PASSWORD: mitra2024
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mitra"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Django Backend
  django:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
      - DEBUG=True
      - ALLOWED_HOSTS=*
    volumes:
      - ./backend:/app
      - media_dev_data:/app/media
      - whisper_model_cache:/root/.cache
      - ~/.claude:/root/.claude:ro
      - ~/.claude.json:/root/.claude.json:ro
    ports:
      - "8000:8000"
    command: >
      uvicorn mitra.asgi:application
        --host 0.0.0.0
        --port 8000
        --reload

  # Angular Frontend (ng serve mit Hot-Reload)
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./mitra-app:/app
      - frontend_node_modules:/app/node_modules   # Linux-native node_modules (kein Windows-Mix)
    ports:
      - "4200:4200"
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
    command: ["/bin/sh", "-c", "npm install --prefer-offline --silent && npx ng serve --host 0.0.0.0 --port 4200 --poll 2000 --proxy-config proxy.conf.json"]
    depends_on:
      - django

  # HTTPS-Proxy für Push-Notification-Tests auf dem Handy
  # Erreichbar via: https://<deine-IP>:4443
  ssl-proxy:
    image: nginx:alpine
    ports:
      - "4443:443"
    depends_on:
      - frontend
    volumes:
      - ./nginx.dev.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl_dev_data:/tmp/ssl
    command: ["/bin/sh", "-c", "apk add --no-cache openssl --quiet && mkdir -p /tmp/ssl && openssl req -x509 -newkey rsa:2048 -keyout /tmp/ssl/key.pem -out /tmp/ssl/cert.pem -days 365 -nodes -subj /CN=mitradev 2>/dev/null ; nginx -g 'daemon off;'"]

volumes:
  postgres_dev_data:
  media_dev_data:
  frontend_node_modules:
  whisper_model_cache:
  ssl_dev_data:
